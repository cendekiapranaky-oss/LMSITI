<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SIT E-Learning</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background: url('https://images.unsplash.com/photo-1497633762265-9d179a990aa6?q=80&w=1920&auto=format&fit=crop') no-repeat center center/cover fixed;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(11, 95, 176, 0.85) 0%, rgba(15, 32, 39, 0.9) 100%);
            z-index: -1;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2); border-radius: 20px;
            padding: 40px; width: 100%; max-width: 400px; text-align: center; color: white;
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        .login-box i.logo-icon { font-size: 50px; color: #95de64; margin-bottom: 10px; text-shadow: 0 0 15px rgba(149, 222, 100, 0.4); }
        .login-box h2 { font-size: 24px; font-weight: 600; margin-bottom: 5px; }
        .login-box p { font-size: 13px; color: rgba(255, 255, 255, 0.6); margin-bottom: 30px; }

        .input-group { position: relative; margin-bottom: 20px; text-align: left; }
        .input-group i { position: absolute; top: 50%; left: 15px; transform: translateY(-50%); color: rgba(255, 255, 255, 0.5); }
        .input-group input {
            width: 100%; padding: 12px 15px 12px 45px; border-radius: 10px; font-size: 14px;
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: #4facfe; background: rgba(255, 255, 255, 0.15); box-shadow: 0 0 10px rgba(79, 172, 254, 0.3); }
        .input-group input::placeholder { color: rgba(255, 255, 255, 0.5); }

        .btn-login {
            width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 15px; font-weight: 600;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-login:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(79, 172, 254, 0.4); }
    </style>
</head>
<body>

    <div class="login-box">
        <i class="fa-solid fa-graduation-cap logo-icon"></i>
        <h2>Selamat Datang</h2>
        <p>Silakan login untuk mengakses E-Learning</p>

        <div class="input-group">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="username" placeholder="NISN atau Username" required>
        </div>
        <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="Password" required>
        </div>

        <button class="btn-login" onclick="prosesLogin()">Masuk Sekarang</button>
    </div>

    <script>
        // Daftar nama siswa yang diizinkan masuk
        const daftarSiswa = [
            "Ammar Bagoes Ibadurrahman",
            "Defan Alawi",
            "Fayyad Amanulloh Aufa Muntaz",
            "Hisan Ali Mursyidan",
            "Mohammad Fadhil Ameri",
            "Muhamad Haidar Aqil Widayanko",
            "Muhammad Bagus Firjatullah",
            "Muhammad Najed Aprij Al Maziro",
            "Muhammad Raditya Pramana Siregar",
            "Radithya Maheswara Marsin",
            "Raditya Firdana Alfath",
            "Rafi Abrar Aldisha Pasaribu",
            "Ramadhan Cannavaro",
            "Sahel Omerta Panuntun",
            "Yuri Kayndra Alqhadir",
            "Yusuf Roofi'ul Islam"
        ];

        function prosesLogin() {
            // Ambil nilai dari inputan dan hilangkan spasi berlebih di awal/akhir
            let user = document.getElementById('username').value.trim();
            let pass = document.getElementById('password').value.trim();

            // Cek apakah form kosong
            if(user === "" || pass === "") {
                alert("Nama dan Password tidak boleh kosong!");
                return;
            }

            // Pengecekan nama (tidak mempedulikan huruf besar/kecil)
            let userValid = daftarSiswa.find(nama => nama.toLowerCase() === user.toLowerCase());

            if(userValid) {
                // Jika nama ada di daftar
                localStorage.setItem("statusLogin", "berhasil");
                
                // Opsional: Simpan nama aslinya untuk ditampilkan di dashboard nanti
                localStorage.setItem("namaSiswa", userValid); 

                alert("Login berhasil! Selamat datang, " + userValid);
                window.location.href = "index.html"; // Pindah ke dashboard
            } else {
                // Jika nama tidak ada di daftar
                alert("Maaf, nama Anda tidak terdaftar di sistem. Silakan cek ejaan nama Anda!");
            }
        }
    </script>

</body>
</html>
