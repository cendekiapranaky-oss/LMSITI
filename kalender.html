<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalender Akademik - SIT E-Learning</title>
    
    <script>
        if (localStorage.getItem("statusLogin") !== "berhasil") {
            window.location.href = "login.html";
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: url('https://images.unsplash.com/photo-1497633762265-9d179a990aa6?q=80&w=1920&auto=format&fit=crop') no-repeat center center/cover fixed;
            color: #ffffff;
            display: flex;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(11, 95, 176, 0.85) 0%, rgba(15, 32, 39, 0.9) 100%);
            z-index: -1;
        }

        /* Glassmorphism Utility */
        .glass-panel {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
        }

        /* Sidebar Styling - Ditambahkan flex-direction column agar logout ada di bawah */
        .sidebar {
            width: 260px; height: 100vh; padding: 25px 20px;
            position: fixed; z-index: 100;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2); backdrop-filter: blur(15px);
            display: flex; flex-direction: column;
        }

        .logo-container {
            display: flex; align-items: center; gap: 12px; margin-bottom: 50px;
            text-decoration: none; cursor: pointer; padding: 0 10px;
        }

        .logo-container i { font-size: 30px; color: #95de64; text-shadow: 0 0 15px rgba(149, 222, 100, 0.4); }
        .logo-container h2 { font-size: 20px; color: #ffffff; font-weight: 700; }

        .menu-item {
            display: flex; align-items: center; padding: 14px 20px; margin-bottom: 8px;
            border-radius: 12px; text-decoration: none; color: rgba(255, 255, 255, 0.7);
            font-weight: 500; transition: all 0.3s ease;
        }

        .menu-item i { margin-right: 15px; font-size: 18px; width: 20px; text-align: center; }
        .menu-item:hover { background: rgba(255, 255, 255, 0.1); color: #ffffff; transform: translateX(5px); }
        .menu-item.active {
            background: linear-gradient(135deg, rgba(82, 196, 26, 0.3) 0%, rgba(82, 196, 26, 0.1) 100%);
            border: 1px solid rgba(82, 196, 26, 0.4); color: #ffffff; box-shadow: 0 5px 15px rgba(82, 196, 26, 0.2);
        }
        .menu-item.active i { color: #95de64; }

        /* Styling khusus tombol logout */
        .menu-logout {
            margin-top: auto; 
            color: #ff4d4f; 
            border-top: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 0; 
            padding-top: 20px;
        }
        .menu-logout:hover { 
            color: #ff7875; 
            background: transparent; 
            transform: none; 
            text-shadow: 0 0 10px rgba(255, 77, 79, 0.4); 
        }

        /* Main Content */
        .main-content { margin-left: 260px; padding: 40px; width: calc(100% - 260px); }

        .header-section {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;
        }
        .header-title h1 { font-size: 28px; font-weight: 700; }
        .header-title p { color: rgba(255, 255, 255, 0.7); font-size: 14px; }

        .calendar-nav { display: flex; gap: 15px; }
        .nav-btn {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; width: 35px; height: 35px; border-radius: 10px; cursor: pointer; transition: 0.3s;
        }
        .nav-btn:hover { background: rgba(255, 255, 255, 0.3); transform: scale(1.05); }

        /* Calendar Layout */
        .calendar-grid-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        .calendar-card { padding: 30px; border-radius: 20px; }
        
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center; }
        .day-name { font-size: 13px; font-weight: 600; color: #4facfe; margin-bottom: 10px; text-transform: uppercase; }
        
        /* Sunday name specifically in red */
        .day-name:first-child { color: #ff7875; }

        .day-num {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            border-radius: 12px; font-size: 15px; cursor: pointer; transition: 0.3s;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }
        .day-num:hover { background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.3); }
        
        /* State Styles */
        .day-num.holiday { color: #ff7875 !important; font-weight: 700; } /* Merah untuk hari libur/akhir pekan */
        .day-num.current { background: #4facfe; color: white !important; font-weight: 700; box-shadow: 0 0 15px rgba(79, 172, 254, 0.5); }
        .day-num.event::after {
            content: ''; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%);
            width: 5px; height: 5px; background: #95de64; border-radius: 50%;
        }
        .day-num.other-month { opacity: 0.15; cursor: default; }

        /* Agenda Section */
        .agenda-card { padding: 25px; border-radius: 20px; max-height: 550px; overflow-y: auto; }
        .agenda-item {
            padding: 15px; border-radius: 15px; background: rgba(255, 255, 255, 0.05);
            margin-bottom: 12px; border-left: 4px solid #4facfe;
        }
        .agenda-item.holiday { border-left-color: #ff4d4f; }
        .agenda-date { font-size: 12px; color: #95de64; font-weight: 600; }
        .agenda-title { font-size: 14px; font-weight: 500; margin-top: 3px; }

        @media (max-width: 1100px) { .calendar-grid-layout { grid-template-columns: 1fr; } }
        @media (max-width: 768px) { .sidebar { transform: translateX(-100%); } .main-content { margin-left: 0; width: 100%; padding: 20px; } }
    </style>
</head>
<body>

    <nav class="sidebar">
        <a href="index.html" class="logo-container">
            <i class="fa-solid fa-graduation-cap"></i>
            <h2>SIT E-Learning</h2>
        </a>
        <a href="index.html" class="menu-item"><i class="fa-solid fa-house"></i><span>Dashboard</span></a>
        <a href="materi.html" class="menu-item"><i class="fa-solid fa-book-open"></i><span>Materi Belajar</span></a>
        <a href="#" class="menu-item"><i class="fa-solid fa-clipboard-list"></i><span>Tugas & Ujian</span></a>
        <a href="kalender.html" class="menu-item active"><i class="fa-solid fa-calendar-days"></i><span>Kalender Akademik</span></a>
        <a href="ranking.html" class="menu-item"><i class="fa-solid fa-trophy"></i><span>Papan Peringkat</span></a>
        <a href="#" class="menu-item"><i class="fa-solid fa-laptop-code"></i><span>Try Out UTBK</span></a>
        <a href="#" class="menu-item"><i class="fa-solid fa-pray"></i><span>Jurnal Ibadah</span></a>
        
        <a href="#" class="menu-item menu-logout" onclick="prosesLogout()">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span>Keluar (Logout)</span>
        </a>
    </nav>

    <main class="main-content">
        <div class="header-section">
            <div class="header-title">
                <h1 id="month-year-display">April 2026</h1>
                <p>Jadwal akademik dan hari libur nasional.</p>
            </div>
            <div class="calendar-nav">
                <button class="nav-btn" id="prev-btn"><i class="fa-solid fa-chevron-left"></i></button>
                <button class="nav-btn" id="next-btn"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>

        <div class="calendar-grid-layout">
            <div class="calendar-card glass-panel">
                <div class="days-grid" id="calendar-days"></div>
            </div>

            <div class="agenda-card glass-panel">
                <h3><i class="fa-solid fa-calendar-check" style="color:#95de64; margin-right:10px;"></i> Agenda Bulan Ini</h3>
                <div id="agenda-list" style="margin-top:20px;"></div>
            </div>
        </div>
    </main>

    <script>
        const eventsData = {
            "2026-01-01": { type: "holiday", title: "Tahun Baru Masehi" },
            "2026-02-18": { type: "holiday", title: "Isra Mikraj Nabi Muhammad SAW" },
            "2026-02-20": { cabbage: "holiday", title: "Tahun Baru Imlek" },
            "2026-03-22": { type: "holiday", title: "Hari Raya Nyepi" },
            "2026-04-03": { type: "holiday", title: "Wafat Yesus Kristus" },
            "2026-04-10": { type: "holiday", title: "Hari Raya Idul Fitri 1447 H" },
            "2026-04-11": { type: "holiday", title: "Cuti Bersama Idul Fitri" },
            "2026-05-01": { type: "holiday", title: "Hari Buruh Internasional" },
            "2026-08-17": { type: "holiday", title: "Hari Kemerdekaan RI" },
            "2026-12-25": { type: "holiday", title: "Hari Raya Natal" },
            
            // Akademik
            "2026-04-13": { type: "event", title: "Mulai PTS Genap", desc: "Ujian tengah semester dimulai." },
            "2026-04-21": { type: "event", title: "Hari Kartini", desc: "Kegiatan Pentas Seni Sekolah." }
        };

        const monthNames = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        let currentMonth = 3; // April (0-indexed)
        let currentYear = 2026;

        function renderCalendar() {
            const calendarDays = document.getElementById("calendar-days");
            const agendaList = document.getElementById("agenda-list");
            calendarDays.innerHTML = "";
            agendaList.innerHTML = "";

            document.getElementById("month-year-display").innerText = `${monthNames[currentMonth]} ${currentYear}`;

            // Render Day Names
            ["Min", "Sen", "Sel", "Rab", "Kam", "Jum", "Sab"].forEach(d => {
                calendarDays.innerHTML += `<div class="day-name">${d}</div>`;
            });

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const prevMonthDays = new Date(currentYear, currentMonth, 0).getDate();

            // Prev Month Filler
            for (let i = firstDay; i > 0; i--) {
                calendarDays.innerHTML += `<div class="day-num other-month">${prevMonthDays - i + 1}</div>`;
            }

            // Current Month Days
            for (let i = 1; i <= daysInMonth; i++) {
                const dateObj = new Date(currentYear, currentMonth, i);
                const dayOfWeek = dateObj.getDay(); // 0 = Minggu, 6 = Sabtu
                const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                
                let classes = "day-num";
                
                // CEK SABTU (6) ATAU MINGGU (0) -> Warna Merah
                if (dayOfWeek === 0 || dayOfWeek === 6) {
                    classes += " holiday";
                }

                // Cek Libur Nasional dari Data
                if (eventsData[dateStr] && eventsData[dateStr].type === "holiday") {
                    classes += " holiday";
                }

                // Cek Event Akademik
                if (eventsData[dateStr] && eventsData[dateStr].type === "event") {
                    classes += " event";
                }

                // Cek Hari Ini (Simulasi 9 April 2026)
                if (dateStr === "2026-04-09") classes += " current";

                calendarDays.innerHTML += `<div class="${classes}">${i}</div>`;

                // Tambahkan ke daftar agenda jika ada event/libur
                if (eventsData[dateStr]) {
                    agendaList.innerHTML += `
                        <div class="agenda-item ${eventsData[dateStr].type}">
                            <div class="agenda-date">${i} ${monthNames[currentMonth]}</div>
                            <div class="agenda-title">${eventsData[dateStr].title}</div>
                        </div>`;
                }
            }
        }

        document.getElementById("prev-btn").onclick = () => { currentMonth--; if(currentMonth<0){currentMonth=11; currentYear--;} renderCalendar(); };
        document.getElementById("next-btn").onclick = () => { currentMonth++; if(currentMonth>11){currentMonth=0; currentYear++;} renderCalendar(); };

        renderCalendar();

    </script>
    <script>
    // Cek apakah user sudah login atau belum
    if (localStorage.getItem("statusLogin") !== "berhasil") {
        // Jika tidak ada data login, tendang balik ke halaman login
        alert("Akses ditolak! Silakan login terlebih dahulu.");
        window.location.href = "login.html";
    }
</script>
</body>
</html>
